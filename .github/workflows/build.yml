name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode auswaehlen
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Tuist installieren
        run: brew install tuist/tuist/tuist

      - name: Projekt generieren
        run: tuist generate --no-open

      - name: App archivieren
        run: |
          xcodebuild archive \
            -project VidSave.xcodeproj \
            -scheme VidSave \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath ./build/VidSave.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Unsigned IPA erstellen
        run: |
          mkdir -p ./build/Payload
          cp -r "./build/VidSave.xcarchive/Products/Applications/VidSave.app" ./build/Payload/
          cd ./build && zip -r VidSave.ipa Payload

      - name: IPA hochladen
        uses: actions/upload-artifact@v4
        with:
          name: VidSave-IPA
          path: ./build/VidSave.ipa
          retention-days: 5